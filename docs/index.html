<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kryptovox — Research Dashboard</title>
<link rel="stylesheet" href="style.css">
<style>
  .dashboard-hero {
    background:    var(--paper-warm);
    border-bottom: 1px solid var(--rule);
    padding:       2.5rem 2rem 2rem;
  }
  .dashboard-hero-inner {
    max-width: var(--max-wide);
    margin:    0 auto;
    display:   flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap:       1.5rem;
  }
  .hero-title {
    font-family:  var(--serif-display);
    font-size:    1.6rem;
    font-weight:  700;
    color:        var(--ink);
    margin-bottom: 0.25rem;
  }
  .hero-sub {
    font-family:  var(--sans);
    font-size:    0.8rem;
    color:        var(--ink-faint);
    letter-spacing: 0.02em;
  }
  .corpus-pill {
    font-family:  var(--sans);
    font-size:    0.75rem;
    font-weight:  600;
    background:   var(--accent-bg);
    color:        var(--accent);
    border:       1px solid #b8d4c0;
    padding:      5px 14px;
    border-radius: 999px;
    letter-spacing: 0.03em;
  }
  .stats-section {
    max-width:  var(--max-wide);
    margin:     2rem auto;
    padding:    0 2rem;
  }
  .stats-grid {
    display:               grid;
    grid-template-columns: repeat(4, 1fr);
    gap:                   0.75rem;
    margin-bottom:         2rem;
  }
  @media (max-width: 640px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
  .accounts-section {
    max-width: var(--max-wide);
    margin:    0 auto;
    padding:   0 2rem 4rem;
  }
  .accounts-grid {
    display:               grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap:                   1rem;
  }
  .loading-msg {
    font-family: var(--sans);
    font-size:   0.85rem;
    color:       var(--ink-faint);
    text-align:  center;
    padding:     3rem;
  }

  /* Modal internals */
  .modal-title {
    font-family:   var(--serif-display);
    font-size:     1.2rem;
    font-weight:   600;
    color:         var(--ink);
    margin-bottom: 1rem;
    padding-right: 2rem;
    line-height:   1.3;
  }
  .modal-section-head {
    font-family:    var(--sans);
    font-size:      0.68rem;
    font-weight:    600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color:          var(--ink-faint);
    margin:         1.5rem 0 0.75rem;
    padding-bottom: 0.4rem;
    border-bottom:  1px solid var(--rule-soft);
  }
  .dim-detail { margin-bottom: 1.25rem; }
  .dim-detail-header {
    display:         flex;
    justify-content: space-between;
    align-items:     baseline;
    margin-bottom:   0.3rem;
  }
  .dim-name {
    font-family: var(--serif-display);
    font-weight: 600;
    font-size:   0.92rem;
    color:       var(--ink);
  }
  .dim-score-val {
    font-family: var(--sans);
    font-weight: 700;
    font-size:   0.85rem;
  }
  .dim-rationale {
    font-size:   0.82rem;
    color:       var(--ink-soft);
    line-height: 1.6;
    margin-bottom: 0.5rem;
  }
  .patterns-list { list-style: none; }
  .patterns-list li {
    font-size:     0.82rem;
    color:         var(--ink-soft);
    padding:       0.3rem 0;
    border-bottom: 1px solid var(--rule-soft);
    line-height:   1.5;
  }
  .patterns-list li:last-child { border-bottom: none; }
  .patterns-list li::before { content: "→ "; color: var(--accent); font-weight: 600; }
  .scoring-notes {
    font-size:      0.82rem;
    color:          var(--ink-soft);
    line-height:    1.65;
    font-style:     italic;
    background:     var(--paper-deep);
    border-radius:  6px;
    padding:        0.875rem 1rem;
    margin-top:     0.5rem;
  }
  .flags-row { display: flex; flex-wrap: wrap; gap: 4px; margin: 0.75rem 0; }
  .yt-link {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  color: var(--ink-faint);
  text-decoration: none;
  font-size: 0.7rem;
  opacity: 0.7;
  transition: opacity 0.15s;
}
.yt-link:hover { opacity: 1; color: #c00; }
.card-meta {
    display:     flex;
    gap:         1rem;
    font-family: var(--sans);
    font-size:   0.7rem;
    color:       var(--ink-faint);
    margin-top:  0.5rem;
  }
</style>
</head>
<body>

<header class="site-header">
  <a href="landing.html" class="wordmark">Krypto<span>vox</span></a>
  <nav class="site-nav">
    <a href="index.html" class="active">Dashboard</a>
    <a href="composite.html">Composite</a>
    <a href="map.html">Map</a>
    <a href="framework.html">Framework</a>
    <a href="submit.html">Submit</a>
    <a href="about.html">About</a>
  </nav>
</header>

<div class="dashboard-hero">
  <div class="dashboard-hero-inner">
    <div>
      <div class="hero-title">Research Dashboard</div>
      <div class="hero-sub">Dogman Encounters corpus — witness credibility analysis</div>
    </div>
    <div class="corpus-pill" id="corpus-pill">Loading...</div>
  </div>
</div>

<div class="stats-section">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="s-total">—</div>
      <div class="stat-label">Witness accounts</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="s-wcs">—</div>
      <div class="stat-label">Avg. credibility score (0–10)</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="s-strong">—</div>
      <div class="stat-label">Score Strong or higher</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="s-hours">—</div>
      <div class="stat-label">Hours of testimony</div>
    </div>
  </div>

  <div class="filter-bar">
    <span class="text-sans text-xs text-muted" style="letter-spacing:0.05em;text-transform:uppercase;">Filter</span>
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('Exceptional',this)">Exceptional</button>
    <button class="filter-btn" onclick="setFilter('Strong',this)">Strong</button>
    <button class="filter-btn" onclick="setFilter('Moderate',this)">Moderate</button>
    <button class="filter-btn" onclick="setFilter('Unreliable',this)">Unreliable</button>
    <input class="filter-input" id="search-input" placeholder="Search accounts..." oninput="renderCards()">
  </div>
</div>

<div class="accounts-section">
  <div class="section-label mb-2">Scored accounts</div>
  <div class="accounts-grid" id="accounts-grid">
    <div class="loading-msg">Loading accounts...</div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box" id="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const DIM_FULL = {
  IC: 'Internal Consistency',
  SS: 'Sensory Specificity',
  SA: 'Spontaneous Elaboration',
  EA: 'Emotional Authenticity',
  CP: 'Contextual Plausibility',
  CO: 'Corroboration',
};
const DIMS = ['IC','SS','SA','EA','CP','CO'];

let allAccounts = [];
let activeFilter = 'all';

function barColor(score) {
  if (score >= 8) return '#2d5a3d';
  if (score >= 6) return '#4a8a5e';
  if (score >= 4) return '#8a6420';
  return '#7a2020';
}

async function loadAll() {
  try {
    const resp = await fetch('dashboard.json?t=' + Date.now());
    const data = await resp.json();
    allAccounts = data.accounts || [];
    updateStats();
    renderCards();
    document.getElementById('corpus-pill').textContent = `${allAccounts.length} accounts`;
  } catch(e) {
    document.getElementById('accounts-grid').innerHTML =
      `<div class="loading-msg" style="color:var(--flag)">Could not load dashboard.json: ${e.message}</div>`;
  }
}

function updateStats() {
  const n = allAccounts.length;
  if (!n) return;
  const avgWCS     = allAccounts.reduce((s,a) => s + (a.WCS_raw||0), 0) / n;
  const strong     = allAccounts.filter(a => (a.WCS_raw||0) >= 7).length;
  const minimise   = allAccounts.filter(a => a.minimisation_phrases && a.minimisation_phrases.length > 0).length;
  const eyes       = allAccounts.filter(a => a.self_illuminated_eyes).length;
  const estHours   = Math.round(n * 70 / 60);

  document.getElementById('s-total').textContent    = n;
  document.getElementById('s-wcs').textContent      = avgWCS.toFixed(1);
  document.getElementById('s-strong').textContent   = strong;
  document.getElementById('s-hours').textContent = '~' + estHours + 'h';
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function cleanTitle(audioFile) {
  return (audioFile || '')
    .replace(/^\d{8}_[\w-]+_/, '')
    .replace(/_wcs$/, '')
    .replace(/_/g, ' ')
    .replace(/\.[^.]+$/, '');
}

function renderCards() {
  const search = document.getElementById('search-input').value.toLowerCase();
  let accounts = allAccounts;
  if (activeFilter !== 'all') accounts = accounts.filter(a => a.WCS_band === activeFilter);
  if (search) accounts = accounts.filter(a => cleanTitle(a.audio_file).toLowerCase().includes(search));

  const grid = document.getElementById('accounts-grid');
  if (!accounts.length) {
    grid.innerHTML = '<div class="loading-msg">No accounts match filter.</div>';
    return;
  }

  grid.innerHTML = accounts.map(a => {
    const title = cleanTitle(a.audio_file);
    const bars = DIMS.map(d => {
      const score = a[d]?.score ?? 0;
      return `<div class="dim-bar">
        <div class="bar-wrap"><div class="bar-fill" style="height:${score*10}%;background:${barColor(score)}"></div></div>
        <div class="dim-val">${score}</div>
        <div class="dim-label">${d}</div>
      </div>`;
    }).join('');

    const flagDefs = [
      ['paralysis_or_freeze','🧊 Paralysis'],
      ['self_illuminated_eyes','✨ Glow Eyes'],
      ['specific_smell_reported','👃 Smell'],
      ['disclosure_delay_indicated','⏳ Delay'],
      ['post_encounter_life_change','🔄 Life Change'],
    ];
    const flags = flagDefs.map(([k,label]) =>
      `<span class="flag-chip ${a[k]?'active':''}">${label}</span>`
    ).join('');

    const idx = allAccounts.indexOf(a);
    return `<div class="account-card" onclick="openModal(${idx})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.5rem">
        <div class="card-title">${title}</div>
        <span class="wcs-badge band-${a.WCS_band}" style="margin-left:0.75rem;flex-shrink:0">${(a.WCS_raw||0).toFixed(1)} ${a.WCS_band}</span>
      </div>
      <div class="dim-bars">${bars}</div>
      <div class="flags-row">${flags}</div>
      <div class="card-meta">
        ${a.video_id ? `<a href="https://youtu.be/${a.video_id}" target="_blank" rel="noopener" onclick="event.stopPropagation()" class="yt-link" title="Watch on YouTube"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.8 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg> YouTube</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

function openModal(idx) {
  const a = allAccounts[idx];
  const title = a.display_title || cleanTitle(a.audio_file);

  const dimHTML = DIMS.map(d => {
    const info = a[d] || {};
    const quotes = (info.evidence_quotes || [])
      .map(q => `<div class="evidence-quote">"${q}"</div>`).join('');
    return `<div class="dim-detail">
      <div class="dim-detail-header">
        <span class="dim-name">${DIM_FULL[d]}</span>
        <span class="dim-score-val" style="color:${barColor(info.score||0)}">${info.score ?? '—'} / 10</span>
      </div>
      <div class="dim-rationale">${info.rationale || ''}</div>
      ${quotes}
    </div>`;
  }).join('');

  const patterns = (a.notable_patterns||[]).map(p=>`<li>${p}</li>`).join('');
  const minimisation = (a.minimisation_phrases||[]).map(p=>`<div class="evidence-quote">"${p}"</div>`).join('');

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-title">${title}</div>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem">
      <span class="wcs-badge band-${a.WCS_band}" style="font-size:0.8rem;padding:4px 14px">WCS ${(a.WCS_raw||0).toFixed(1)} — ${a.WCS_band}</span>
    </div>
    <div class="modal-section-head">Dimension Scores</div>
    ${dimHTML}
    ${patterns ? `<div class="modal-section-head">Notable Patterns</div><ul class="patterns-list">${patterns}</ul>` : ''}
    ${minimisation ? `<div class="modal-section-head">Minimisation Phrases</div>${minimisation}` : ''}
    ${a.scoring_notes ? `<div class="modal-section-head">Scoring Notes</div><div class="scoring-notes">${a.scoring_notes}</div>` : ''}
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

loadAll();
</script>
</body>
</html>
